services:
  redis:
    image: redis:7-alpine
    container_name: farmapp-redis
    restart: unless-stopped

  web:
    image: ${DOCKER_IMAGE}
    container_name: farmapp-backend
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    volumes:
      - ./config/firebase-service-account.json:/app/config/firebase-service-account.json:ro

  celery:
    image: ${DOCKER_IMAGE}
    container_name: farmapp-celery
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - ./config/firebase-service-account.json:/app/config/firebase-service-account.json:ro
    command: celery -A config worker --loglevel=info --queues=default
